<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamCraft Studio Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-512.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
    <style>
        body { background: #0f172a; color: white; overflow: hidden; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; touch-action: none; }
        
        /* Adaptive Canvas Wrap */
        #canvas-wrap { flex: 1; background: #000; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #render-canvas { max-width: 100%; max-height: 100%; object-fit: contain; box-shadow: 0 0 50px rgba(0,0,0,0.9); }

        /* Flexible Control Bar */
        .control-bar { 
            background: #1e293b; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            padding: 15px; 
            border-top: 2px solid #334155;
            min-height: 35vh;
        }

        /* Portrait Mode Adjustments */
        @media (orientation: portrait) {
            .control-bar { grid-template-columns: 1fr; padding-bottom: 40px; overflow-y: auto; }
            .panel { align-items: center !important; text-align: center !important; }
            #canvas-wrap { height: 40vh; flex: none; }
        }

        .panel { display: flex; flex-direction: column; gap: 6px; }
        .rec-btn { width: 65px; height: 65px; border-radius: 50%; background: #ef4444; border: 4px solid #fff; cursor: pointer; transition: 0.3s; }
        .rec-btn.active { border-radius: 12px; background: #fff; border-color: #ef4444; animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.5; } }
        .btn-mobile { min-height: 44px; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 12px; font-size: 10px; text-transform: uppercase; }
        
        input[type=range] { appearance: none; background: #334155; height: 4px; border-radius: 5px; width: 100%; }
        input[type=range]::-webkit-slider-thumb { appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #3b82f6; border: 2px solid #fff; }
    </style>
</head>
<body>

<div class="fixed top-4 left-4 flex gap-2 items-center z-[90]">
    <div id="status-badge" class="px-3 py-1 rounded-full text-[10px] font-bold bg-gray-500/20 text-gray-400 border border-gray-500/50 uppercase">DEMO</div>
    <button id="upgrade-btn" onclick="checkLicense()" class="bg-gradient-to-r from-yellow-400 to-orange-500 text-black px-4 py-1.5 rounded-full text-[10px] font-black shadow-lg">UPGRADE</button>
    <button onclick="toggleGallery()" class="bg-slate-800/80 px-4 py-1.5 rounded-full text-[10px] font-bold border border-slate-700 ml-2">🎬 GALLERY</button>
</div>

<div id="canvas-wrap"><canvas id="render-canvas"></canvas></div>

<div class="control-bar">
    <div class="col-span-full flex justify-center items-center gap-6 pb-2 border-b border-slate-700/50">
        <button id="mute-btn" onclick="toggleMasterMute()" class="w-10 h-10 rounded-xl bg-slate-800 border border-slate-700">🔊</button>
        <div id="rec-trigger" class="rec-btn" onclick="toggleRecording()"></div>
        <div class="flex flex-col items-center">
            <span id="timer" class="text-[10px] font-mono text-red-500 opacity-0 mb-1 font-bold">REC 00:00</span>
            <input type="color" id="pen-color" value="#3b82f6" class="w-8 h-8 bg-transparent border-none p-0">
        </div>
        <button onclick="clearDraw()" class="text-[9px] text-gray-500 underline uppercase">Clear Ink</button>
    </div>

    <div class="panel items-start">
        <span class="text-[9px] font-black text-blue-400 uppercase tracking-widest">Selfie Setup</span>
        <div class="flex gap-2 w-full">
            <button onclick="startCamera('small', 'user')" class="btn-mobile flex-1 bg-blue-600">LIVE SELFIE</button>
            <button onclick="toggleMirror()" class="btn-mobile w-12 bg-slate-700">🪞</button>
        </div>
        <div class="w-full flex items-center gap-2 mt-1 px-1">
            <span class="text-[10px]">🎤</span>
            <input type="range" min="0" max="1" step="0.1" value="0.8" oninput="updateVol('small', this.value)">
        </div>
    </div>

    <div class="panel items-end text-right">
        <span class="text-[9px] font-black text-green-400 uppercase tracking-widest">Media Setup</span>
        <div class="flex gap-2 w-full">
            <button onclick="upload('full')" class="btn-mobile flex-1 bg-slate-700">FILE</button>
            <button id="play-pause-btn" onclick="togglePlayback()" class="btn-mobile w-12 bg-slate-800 border border-slate-700">⏯️</button>
            <button onclick="startScreenShare()" class="btn-mobile flex-1 bg-green-600">SCREEN</button>
        </div>
        <div class="w-full flex items-center gap-2 mt-1 px-1">
            <input type="range" min="0" max="1" step="0.1" value="0.5" oninput="updateVol('full', this.value)">
            <span class="text-[10px]">🔊</span>
        </div>
    </div>
</div>

<div id="gallery-overlay" class="hidden fixed inset-0 bg-slate-950/98 z-[100] overflow-y-auto p-6">
    <div class="flex justify-between items-center mb-8 max-w-4xl mx-auto">
        <h2 class="text-3xl font-black italic text-blue-400">GALLERY</h2>
        <button onclick="toggleGallery()" class="text-2xl">✕</button>
    </div>
    <div id="gallery-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-6xl mx-auto"></div>
</div>

<input type="file" id="file-picker" class="hidden">

<script>
    const canvas = document.getElementById('render-canvas');
    const ctx = canvas.getContext('2d');
    let audioCtx, audioDest, recorder, chunks = [], selfieSeg, drawCtx, drawCanvas, recordingTimer, db;
    const PRO_KEY = "STREAM-PRO-2026";

    const state = {
        full: { el: null, pdf: null, page: 1, gain: null, vol: 0.5 },
        small: { el: null, x: 50, y: 380, w: 320, h: 180, dragging: false, resizing: false, opacity: 1, targetOpacity: 1, gain: null, vol: 0.8, mirrored: true },
        isRecording: false, drawing: false, isMuted: false, masterGain: null,
        isPro: localStorage.getItem('sc_pro_active') === 'true'
    };

    const dbReq = indexedDB.open("StreamCraftDB", 1);
    dbReq.onupgradeneeded = (e) => { e.target.result.createObjectStore("videos", { keyPath: "id", autoIncrement: true }); };
    dbReq.onsuccess = (e) => { db = e.target.result; init(); };

    function init() {
        canvas.width = 1280; canvas.height = 720;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        drawCanvas = document.createElement('canvas'); drawCanvas.width = 1280; drawCanvas.height = 720;
        drawCtx = drawCanvas.getContext('2d'); drawCtx.lineCap = 'round'; drawCtx.lineWidth = 6;
        updateProUI(); setupInteractions(); requestAnimationFrame(renderLoop);
    }

    function toggleMirror() { state.small.mirrored = !state.small.mirrored; }

    function renderLoop() {
        ctx.fillStyle='#000'; ctx.fillRect(0,0,1280,720);
        if(state.full.el) ctx.drawImage(state.full.el, 0,0,1280,720);
        ctx.drawImage(drawCanvas, 0,0);
        
        if(state.small.el && state.small.opacity > 0) {
            const s = state.small;
            ctx.save();
            ctx.globalAlpha = s.opacity;
            ctx.shadowBlur = 20; ctx.shadowColor = "black";
            
            if(s.mirrored) {
                ctx.translate(s.x + s.w, s.y);
                ctx.scale(-1, 1);
                ctx.drawImage(s.el, 0, 0, s.w, s.h);
            } else {
                ctx.drawImage(s.el, s.x, s.y, s.w, s.h);
            }
            ctx.restore();
            
            // Resize handle
            if(!state.isRecording) {
                ctx.fillStyle = "#fbbf24";
                ctx.fillRect(s.x + s.w - 15, s.y + s.h - 15, 15, 15);
            }
        }
        requestAnimationFrame(renderLoop);
    }

    // --- RE-USE PREVIOUS AUDIO/UPLOAD/RECORDING LOGIC FROM THE MASTER BUILD ---
    // (Ensure you keep the mixAudio, toggleRecording, and upload functions from the previous version)
    
    function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioDest = audioCtx.createMediaStreamDestination();
        state.masterGain = audioCtx.createGain();
        state.masterGain.connect(audioDest);
        state.masterGain.connect(audioCtx.destination);
    }

    async function startCamera(target, mode) {
        initAudio();
        try {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode }, audio: true });
            const v = document.createElement('video'); v.srcObject = s; v.play();
            if (target === 'small') {
                if(!selfieSeg) await initSegmentation();
                const run = async () => { if(v.readyState>=2) await selfieSeg.send({image:v}); requestAnimationFrame(run); }; run();
            } else state.full.el = v;
            mixAudio(v, target, s);
        } catch(e) { alert("Camera Access Required"); }
    }

    async function initSegmentation() {
        selfieSeg = new SelfieSegmentation({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${f}`});
        selfieSeg.setOptions({ modelSelection: 1 });
        selfieSeg.onResults(res => {
            const off = document.createElement('canvas'); off.width = 640; off.height = 480;
            const oCtx = off.getContext('2d');
            oCtx.drawImage(res.segmentationMask, 0, 0, 640, 480);
            oCtx.globalCompositeOperation = 'source-in';
            oCtx.drawImage(res.image, 0, 0, 640, 480);
            state.small.el = off;
        });
    }

    function mixAudio(el, target, stream = null) {
        initAudio(); if (audioCtx.state === 'suspended') audioCtx.resume();
        let source = stream ? audioCtx.createMediaStreamSource(stream) : audioCtx.createMediaElementSource(el);
        const g = audioCtx.createGain(); g.gain.value = state[target].vol;
        source.connect(g).connect(state.masterGain);
        state[target].gain = g;
    }

    function updateVol(target, val) {
        state[target].vol = parseFloat(val);
        if (state[target].gain) state[target].gain.gain.setTargetAtTime(val, audioCtx.currentTime, 0.01);
    }

    function toggleMasterMute() {
        initAudio(); state.isMuted = !state.isMuted;
        state.masterGain.gain.setTargetAtTime(state.isMuted ? 0 : 1, audioCtx.currentTime, 0.05);
        document.getElementById('mute-btn').innerText = state.isMuted ? "🔇" : "🔊";
    }

    function togglePlayback() {
        const media = state.full.el;
        if (media && media.tagName === 'VIDEO') {
            media.paused ? media.play() : media.pause();
        }
    }

    function toggleRecording() {
        const btn = document.getElementById('rec-trigger');
        if (!state.isRecording) {
            chunks = []; const s = canvas.captureStream(60);
            if(audioDest) s.addTrack(audioDest.stream.getAudioTracks()[0]);
            recorder = new MediaRecorder(s, { mimeType: 'video/webm' });
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const b = new Blob(chunks, { type: 'video/webm' });
                saveToLocalDB(b);
                const a = document.createElement('a'); a.href = URL.createObjectURL(b);
                a.download = "Studio_Capture.webm"; a.click();
            };
            recorder.start(); state.isRecording = true; btn.classList.add('active');
            document.getElementById('timer').classList.remove('opacity-0');
        } else { recorder.stop(); state.isRecording = false; btn.classList.remove('active'); }
    }

    async function saveToLocalDB(blob) {
        const entry = { blob: blob, timestamp: new Date().toLocaleString(), size: (blob.size / 1024 / 1024).toFixed(1) + " MB" };
        db.transaction(["videos"], "readwrite").objectStore("videos").add(entry);
    }

    function upload(t){const p=document.getElementById('file-picker');p.onchange=async(e)=>{const f=e.target.files[0],u=URL.createObjectURL(f);if(f.type==='application/pdf'){state[t].pdf=await pdfjsLib.getDocument(u).promise;renderPDF(t,1)}else if(f.type.startsWith('video')){const v=document.createElement('video');v.src=u;v.loop=true;v.play();state[t].el=v;mixAudio(v,t)}else{const i=new Image();i.src=u;state[t].el=i}};p.click();}
    async function renderPDF(t,n){const p=await state[t].pdf.getPage(n),v=p.getViewport({scale:2}),c=document.createElement('canvas');c.width=v.width;c.height=v.height;await p.render({canvasContext:c.getContext('2d'),viewport:v}).promise;state[t].el=c;}
    
    function toggleGallery() { document.getElementById('gallery-overlay').classList.toggle('hidden'); if(!document.getElementById('gallery-overlay').classList.contains('hidden')) loadGallery(); }
    function loadGallery() {
        const grid = document.getElementById('gallery-grid'); grid.innerHTML = "";
        db.transaction("videos").objectStore("videos").openCursor(null, 'prev').onsuccess = (e) => {
            const c = e.target.result;
            if (c) {
                const d = c.value; const u = URL.createObjectURL(d.blob);
                grid.innerHTML += `<div class="bg-slate-900 p-4 rounded-2xl"><video src="${u}" controls class="w-full rounded-lg mb-2"></video><p class="text-[10px]">${d.timestamp}</p></div>`;
                c.continue();
            }
        };
    }

    function setupInteractions() {
        const getPos=(e)=>{
            const r=canvas.getBoundingClientRect();
            const cX = e.touches ? e.touches[0].clientX : e.clientX;
            const cY = e.touches ? e.touches[0].clientY : e.clientY;
            return {x:(cX-r.left)*(1280/r.width), y:(cY-r.top)*(720/r.height)};
        };
        const start=(e)=>{
            const p=getPos(e), s=state.small;
            if(p.x>s.x+s.w-60 && p.y>s.y+s.h-60) state.small.resizing=true;
            else if(p.x>s.x && p.x<s.x+s.w && p.y>s.y && p.y<s.y+s.h) state.small.dragging=true;
            else { state.drawing=true; drawCtx.beginPath(); drawCtx.moveTo(p.x,p.y); drawCtx.strokeStyle=document.getElementById('pen-color').value; }
        };
        const move=(e)=>{
            if(!state.small.dragging && !state.small.resizing && !state.drawing) return;
            const p=getPos(e);
            if(state.small.dragging){state.small.x=p.x-state.small.w/2; state.small.y=p.y-state.small.h/2;}
            if(state.small.resizing){state.small.w=Math.max(150, p.x-state.small.x); state.small.h=Math.max(100, p.y-state.small.y);}
            if(state.drawing){drawCtx.lineTo(p.x,p.y); drawCtx.stroke();}
        };
        canvas.addEventListener('mousedown', start); canvas.addEventListener('touchstart', start, {passive:false});
        window.addEventListener('mousemove', move); window.addEventListener('touchmove', move, {passive:false});
        window.addEventListener('mouseup', () => state.small.dragging=state.small.resizing=state.drawing=false);
        window.addEventListener('touchend', () => state.small.dragging=state.small.resizing=state.drawing=false);
    }
    
    function checkLicense() { if (prompt("Enter License Key:") === PRO_KEY) { localStorage.setItem('sc_pro_active', 'true'); location.reload(); } }
    function updateProUI() { if (state.isPro) { document.getElementById('status-badge').innerText = "⭐ PRO ACTIVE"; document.getElementById('upgrade-btn').remove(); } }
    function clearDraw(){drawCtx.clearRect(0,0,1280,720);}
</script>
</body>
</html>
