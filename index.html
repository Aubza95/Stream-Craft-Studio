<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamCraft Studio Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-512.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
    <style>
        body { background: #0f172a; color: white; overflow: hidden; font-family: sans-serif; touch-action: none; }
        #canvas-wrap { height: 60vh; background: #000; position: relative; display: flex; align-items: center; justify-content: center; }
        #render-canvas { max-width: 100%; max-height: 100%; object-fit: contain; box-shadow: 0 0 50px rgba(0,0,0,0.9); }
        .control-bar { height: 40vh; background: #1e293b; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto 1fr; gap: 10px; padding: 15px; border-top: 2px solid #334155; }
        .panel { display: flex; flex-direction: column; gap: 6px; }
        .rec-btn { width: 70px; height: 70px; border-radius: 50%; background: #ef4444; border: 4px solid #fff; cursor: pointer; transition: 0.3s; }
        .rec-btn.active { border-radius: 15px; background: #fff; border-color: #ef4444; animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.5; } }
        .btn-mobile { min-height: 44px; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 12px; font-size: 10px; text-transform: uppercase; }
        input[type=range] { appearance: none; background: #334155; height: 4px; border-radius: 5px; }
        input[type=range]::-webkit-slider-thumb { appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #3b82f6; cursor: pointer; border: 2px solid #fff; }
    </style>
</head>
<body>

<div class="fixed top-4 left-4 flex gap-2 items-center z-[90]">
    <div id="status-badge" class="px-3 py-1 rounded-full text-[10px] font-bold bg-gray-500/20 text-gray-400 border border-gray-500/50 uppercase">DEMO</div>
    <button id="upgrade-btn" onclick="checkLicense()" class="bg-gradient-to-r from-yellow-400 to-orange-500 text-black px-4 py-1.5 rounded-full text-[10px] font-black shadow-lg">UPGRADE</button>
    <button onclick="toggleGallery()" class="bg-slate-800/80 px-4 py-1.5 rounded-full text-[10px] font-bold border border-slate-700 ml-2">🎬 GALLERY</button>
</div>

<div id="canvas-wrap"><canvas id="render-canvas"></canvas></div>

<div class="control-bar">
    <div class="col-span-2 flex justify-center items-center gap-6 pb-2 border-b border-slate-700/50">
        <button id="mute-btn" onclick="toggleMasterMute()" class="w-10 h-10 rounded-xl bg-slate-800 border border-slate-700 flex items-center justify-center text-lg">🔊</button>
        <div id="rec-trigger" class="rec-btn" onclick="toggleRecording()"></div>
        <div class="flex flex-col items-center">
            <span id="timer" class="text-[10px] font-mono text-red-500 opacity-0 mb-1 font-bold">REC 00:00</span>
            <input type="color" id="pen-color" value="#3b82f6" class="w-10 h-10 bg-transparent border-none p-0 cursor-pointer">
        </div>
        <button onclick="clearDraw()" class="text-[9px] text-gray-500 underline uppercase tracking-tighter">Clear Ink</button>
    </div>

    <div class="panel items-start">
        <span class="text-[9px] font-black text-blue-400 uppercase tracking-widest">Selfie / Mic</span>
        <button onclick="startCamera('small', 'user')" class="btn-mobile w-full bg-blue-600 shadow-lg">LIVE SELFIE</button>
        <div class="w-full flex items-center gap-2 mt-1 px-1">
            <span class="text-[10px]">🎤</span>
            <input type="range" min="0" max="1" step="0.1" value="0.8" oninput="updateVol('small', this.value)" class="w-full">
        </div>
    </div>

    <div class="panel items-end text-right">
        <span class="text-[9px] font-black text-green-400 uppercase tracking-widest">Backdrop / Media</span>
        <div class="flex gap-2 w-full">
            <button onclick="upload('full')" class="btn-mobile flex-1 bg-slate-700">FILE</button>
            <button id="play-pause-btn" onclick="togglePlayback()" class="btn-mobile w-12 bg-slate-800 border border-slate-700 text-lg">⏯️</button>
            <button onclick="startScreenShare()" class="btn-mobile flex-1 bg-green-600">SCREEN</button>
        </div>
        <div class="w-full flex items-center gap-2 mt-1 px-1">
            <input type="range" min="0" max="1" step="0.1" value="0.5" oninput="updateVol('full', this.value)" class="w-full">
            <span class="text-[10px]">🔊</span>
        </div>
    </div>
</div>

<div id="gallery-overlay" class="hidden fixed inset-0 bg-slate-950/98 z-[100] overflow-y-auto p-6 backdrop-blur-xl">
    <div class="flex justify-between items-center mb-8 max-w-4xl mx-auto">
        <h2 class="text-3xl font-black italic text-blue-400">STUDIO GALLERY</h2>
        <button onclick="toggleGallery()" class="bg-slate-800 w-10 h-10 rounded-full flex items-center justify-center font-bold">✕</button>
    </div>
    <div id="gallery-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-6xl mx-auto"></div>
    <div id="gallery-empty" class="text-center py-40 text-gray-600 hidden uppercase font-bold tracking-widest">No Local Recordings</div>
</div>

<div id="tutorial-overlay" class="hidden fixed inset-0 bg-black/95 z-[110] flex flex-col items-center justify-center p-8 text-center">
    <h2 id="tutorial-title" class="text-2xl font-black text-blue-400 mb-2 uppercase italic tracking-tighter"></h2>
    <p id="tutorial-text" class="text-gray-400 max-w-xs mb-8 text-sm leading-relaxed"></p>
    <button onclick="nextStep()" class="bg-blue-600 px-12 py-4 rounded-full font-black text-lg shadow-xl active:scale-95 transition">CONTINUE</button>
    <div id="pointer" class="absolute w-12 h-12 border-4 border-yellow-400 rounded-full animate-ping hidden"></div>
</div>

<input type="file" id="file-picker" class="hidden">

<script>
    const canvas = document.getElementById('render-canvas');
    const ctx = canvas.getContext('2d');
    let audioCtx, audioDest, recorder, chunks = [], selfieSeg, drawCtx, drawCanvas, recordingTimer, db;
    const PRO_KEY = "STREAM-PRO-2026";

    const state = {
        full: { el: null, pdf: null, page: 1, gain: null, vol: 0.5 },
        small: { el: null, x: 50, y: 380, w: 320, h: 180, dragging: false, resizing: false, opacity: 1, targetOpacity: 1, gain: null, vol: 0.8 },
        branding: { logo: null, x: 1100, y: 40 },
        isRecording: false, drawing: false, isMuted: false, masterGain: null,
        isPro: localStorage.getItem('sc_pro_active') === 'true'
    };

    const dbReq = indexedDB.open("StreamCraftDB", 1);
    dbReq.onupgradeneeded = (e) => { e.target.result.createObjectStore("videos", { keyPath: "id", autoIncrement: true }); };
    dbReq.onsuccess = (e) => { db = e.target.result; init(); };

    function init() {
        canvas.width = 1280; canvas.height = 720;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        drawCanvas = document.createElement('canvas'); drawCanvas.width = 1280; drawCanvas.height = 720;
        drawCtx = drawCanvas.getContext('2d'); drawCtx.lineCap = 'round'; drawCtx.lineWidth = 6;
        updateProUI(); setupInteractions(); requestAnimationFrame(renderLoop);
        if (!localStorage.getItem('sc_onboarded')) startTutorial();
    }

    function checkLicense() {
        if (prompt("Enter License Key:") === PRO_KEY) { 
            localStorage.setItem('sc_pro_active', 'true'); 
            if(navigator.vibrate) navigator.vibrate([50, 50, 50]);
            location.reload(); 
        } else alert("Invalid Key!");
    }

    function updateProUI() {
        if (state.isPro) {
            document.getElementById('status-badge').innerText = "⭐ PRO ACTIVE";
            document.getElementById('status-badge').className = "px-3 py-1 rounded-full text-[10px] font-bold bg-blue-500/20 text-blue-400 border border-blue-500/50";
            document.getElementById('upgrade-btn').remove();
        }
    }

    function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioDest = audioCtx.createMediaStreamDestination();
        state.masterGain = audioCtx.createGain();
        state.masterGain.connect(audioDest);
        state.masterGain.connect(audioCtx.destination);
    }

    async function startCamera(target, mode) {
        initAudio();
        try {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode }, audio: true });
            const v = document.createElement('video'); v.srcObject = s; v.play();
            if (target === 'small') {
                if(!selfieSeg) await initSegmentation();
                const run = async () => { if(v.readyState>=2) await selfieSeg.send({image:v}); requestAnimationFrame(run); }; run();
            } else state.full.el = v;
            mixAudio(v, target, s);
        } catch(e) { alert("Camera Permission Required"); }
    }

    async function initSegmentation() {
        selfieSeg = new SelfieSegmentation({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${f}`});
        selfieSeg.setOptions({ modelSelection: 1 });
        selfieSeg.onResults(res => {
            const off = document.createElement('canvas'); off.width = 640; off.height = 480;
            const oCtx = off.getContext('2d');
            oCtx.drawImage(res.segmentationMask, 0, 0, 640, 480);
            oCtx.globalCompositeOperation = 'source-in';
            oCtx.drawImage(res.image, 0, 0, 640, 480);
            state.small.el = off;
        });
    }

    function mixAudio(el, target, stream = null) {
        initAudio(); if (audioCtx.state === 'suspended') audioCtx.resume();
        let source = stream ? audioCtx.createMediaStreamSource(stream) : audioCtx.createMediaElementSource(el);
        const g = audioCtx.createGain(); g.gain.value = state[target].vol;
        source.connect(g).connect(state.masterGain);
        state[target].gain = g;
    }

    function updateVol(target, val) {
        state[target].vol = parseFloat(val);
        if (state[target].gain) state[target].gain.gain.setTargetAtTime(val, audioCtx.currentTime, 0.01);
    }

    function toggleMasterMute() {
        initAudio(); state.isMuted = !state.isMuted;
        state.masterGain.gain.setTargetAtTime(state.isMuted ? 0 : 1, audioCtx.currentTime, 0.05);
        const btn = document.getElementById('mute-btn');
        btn.innerText = state.isMuted ? "🔇" : "🔊";
        btn.classList.toggle('bg-red-900/30', state.isMuted);
        if(navigator.vibrate) navigator.vibrate(30);
    }

    function togglePlayback() {
        const media = state.full.el;
        const btn = document.getElementById('play-pause-btn');
        if (media && media.tagName === 'VIDEO') {
            if (media.paused) { media.play(); btn.innerText = "⏸️"; }
            else { media.pause(); btn.innerText = "▶️"; }
            if(navigator.vibrate) navigator.vibrate(40);
        } else alert("Upload a video file to use playback controls.");
    }

    function toggleRecording() {
        if(navigator.vibrate) navigator.vibrate(60);
        const btn = document.getElementById('rec-trigger');
        const timer = document.getElementById('timer');
        if (!state.isRecording) {
            chunks = []; const s = canvas.captureStream(60);
            if(audioDest) s.addTrack(audioDest.stream.getAudioTracks()[0]);
            recorder = new MediaRecorder(s, { mimeType: 'video/webm' });
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const b = new Blob(chunks, { type: 'video/webm' });
                saveToLocalDB(b);
                const a = document.createElement('a'); a.href = URL.createObjectURL(b);
                a.download = state.isPro ? "Studio_Pro.webm" : "Studio_Demo.webm"; a.click();
            };
            recorder.start(); state.isRecording = true; btn.classList.add('active'); timer.classList.remove('opacity-0');
            let secs = 0; recordingTimer = setInterval(() => {
                secs++; timer.innerText = `REC ${Math.floor(secs/60).toString().padStart(2,'0')}:${(secs%60).toString().padStart(2,'0')}`;
                if(!state.isPro && secs >= 30) { toggleRecording(); alert("Demo Limit: 30s. Upgrade for Unlimited!"); }
            }, 1000);
        } else { recorder.stop(); state.isRecording = false; btn.classList.remove('active'); clearInterval(recordingTimer); }
    }

    async function saveToLocalDB(blob) {
        const entry = { blob: blob, timestamp: new Date().toLocaleString(), size: (blob.size / 1024 / 1024).toFixed(1) + " MB" };
        db.transaction(["videos"], "readwrite").objectStore("videos").add(entry);
    }

    function toggleGallery() {
        const overlay = document.getElementById('gallery-overlay');
        overlay.classList.toggle('hidden');
        if (!overlay.classList.contains('hidden')) loadGallery();
    }

    function loadGallery() {
        const grid = document.getElementById('gallery-grid');
        const empty = document.getElementById('gallery-empty');
        grid.innerHTML = "";
        db.transaction("videos").objectStore("videos").openCursor(null, 'prev').onsuccess = (e) => {
            const cursor = e.target.result;
            if (cursor) {
                const data = cursor.value; const url = URL.createObjectURL(data.blob);
                const card = document.createElement('div');
                card.className = "bg-slate-900 border border-slate-800 p-4 rounded-3xl";
                card.innerHTML = `<video src="${url}" controls class="w-full rounded-2xl mb-4 bg-black aspect-video"></video>
                    <div class="flex justify-between items-center"><div class="text-[10px]"><p class="text-white font-bold">${data.timestamp}</p><p class="text-gray-500">${data.size}</p></div>
                    <div class="flex gap-2"><button onclick="deleteVideo(${data.id})" class="text-red-500 font-bold text-[9px] uppercase">Delete</button>
                    <a href="${url}" download="record.webm" class="bg-blue-600 px-3 py-1.5 rounded-lg font-bold text-[9px]">SAVE</a></div></div>`;
                grid.appendChild(card); cursor.continue();
            } else { grid.children.length === 0 ? empty.classList.remove('hidden') : empty.classList.add('hidden'); }
        };
    }

    function deleteVideo(id) { if(confirm("Delete recording?")) { db.transaction(["videos"], "readwrite").objectStore("videos").delete(id); loadGallery(); } }

    function setupInteractions() {
        const getPos=(e)=>{
            const r=canvas.getBoundingClientRect();
            const cX = e.touches ? e.touches[0].clientX : e.clientX;
            const cY = e.touches ? e.touches[0].clientY : e.clientY;
            return {x:(cX-r.left)*(1280/r.width), y:(cY-r.top)*(720/r.height)};
        };
        const start=(e)=>{
            const p=getPos(e), s=state.small;
            if(p.x>s.x+s.w-60 && p.y>s.y+s.h-60) state.small.resizing=true;
            else if(p.x>s.x && p.x<s.x+s.w && p.y>s.y && p.y<s.y+s.h) state.small.dragging=true;
            else { state.drawing=true; drawCtx.beginPath(); drawCtx.moveTo(p.x,p.y); drawCtx.strokeStyle=document.getElementById('pen-color').value; }
        };
        const move=(e)=>{
            if(!state.small.dragging && !state.small.resizing && !state.drawing) return;
            const p=getPos(e);
            if(state.small.dragging){state.small.x=p.x-state.small.w/2; state.small.y=p.y-state.small.h/2;}
            if(state.small.resizing){state.small.w=Math.max(150, p.x-state.small.x); state.small.h=Math.max(100, p.y-state.small.y);}
            if(state.drawing){drawCtx.lineTo(p.x,p.y); drawCtx.stroke();}
        };
        canvas.addEventListener('mousedown', start); canvas.addEventListener('touchstart', start, {passive:false});
        window.addEventListener('mousemove', move); window.addEventListener('touchmove', move, {passive:false});
        window.addEventListener('mouseup', () => state.small.dragging=state.small.resizing=state.drawing=false);
        window.addEventListener('touchend', () => state.small.dragging=state.small.resizing=state.drawing=false);
    }

    function renderLoop() {
        ctx.fillStyle='#000'; ctx.fillRect(0,0,1280,720);
        if(state.full.el) ctx.drawImage(state.full.el, 0,0,1280,720);
        ctx.drawImage(drawCanvas, 0,0);
        if(state.small.el) {
            const s=state.small;
            if(s.opacity<s.targetOpacity) s.opacity+=0.04; if(s.opacity>s.targetOpacity) s.opacity-=0.04;
            if(s.opacity>0){
                ctx.save(); ctx.globalAlpha=s.opacity; ctx.shadowBlur=30; ctx.shadowColor="rgba(0,0,0,0.6)";
                ctx.drawImage(s.el, s.x, s.y, s.w, s.h);
                if(!state.isRecording && s.opacity===1){ ctx.fillStyle="#fbbf24"; ctx.fillRect(s.x+s.w-20, s.y+s.h-20, 20, 20); }
                ctx.restore();
            }
        }
        requestAnimationFrame(renderLoop);
    }

    function upload(t){const p=document.getElementById('file-picker');p.onchange=async(e)=>{const f=e.target.files[0],u=URL.createObjectURL(f);if(f.type==='application/pdf'){state[t].pdf=await pdfjsLib.getDocument(u).promise;renderPDF(t,1)}else if(f.type.startsWith('video')){const v=document.createElement('video');v.src=u;v.loop=true;v.play();state[t].el=v;mixAudio(v,t)}else{const i=new Image();i.src=u;state[t].el=i}};p.click();}
    async function renderPDF(t,n){const p=await state[t].pdf.getPage(n),v=p.getViewport({scale:2}),c=document.createElement('canvas');c.width=v.width;c.height=v.height;await p.render({canvasContext:c.getContext('2d'),viewport:v}).promise;state[t].el=c;}
    function startScreenShare(){if(!state.isPro){checkLicense();return;}navigator.mediaDevices.getDisplayMedia({video:true,audio:true}).then(s=>{const v=document.createElement('video');v.srcObject=s;v.play();state.full.el=v;mixAudio(v, 'full', s);});}
    function clearDraw(){drawCtx.clearRect(0,0,1280,720);}
    
    let curS=0; const steps=[{t:"Selfie",d:"LIVE SELFIE uses AI to cut you out. Drag to move, resize from the corner.",p:{b:'25%',l:'15%'}},{t:"Sync Controls",d:"Use Play/Pause to time your reaction with the background video.",p:{b:'20%',l:'60%'}},{t:"Audio",d:"Balance your mic and video with the sliders and Master Mute.",p:{b:'25%',l:'35%'}}];
    function startTutorial(){curS=0;document.getElementById('tutorial-overlay').classList.remove('hidden');nextStep();}
    function nextStep(){if(curS>=steps.length){document.getElementById('tutorial-overlay').classList.add('hidden');localStorage.setItem('sc_onboarded',true);return;}const s=steps[curS],ptr=document.getElementById('pointer');document.getElementById('tutorial-title').innerText=s.t;document.getElementById('tutorial-text').innerText=s.d;ptr.classList.remove('hidden');ptr.style.bottom=s.p.b;ptr.style.left=s.p.l||'auto';ptr.style.right=s.p.r||'auto';curS++;}
</script>
</body>
</html>
