<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>StreamCraft Studio Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-512.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
    <style>
        :root {
            --bg-deep: #020617;
            --glass: rgba(15, 23, 42, 0.92);
            --accent-blue: linear-gradient(135deg, #3b82f6, #1d4ed8);
            --accent-green: linear-gradient(135deg, #10b981, #047857);
            --accent-red: linear-gradient(135deg, #ef4444, #b91c1c);
        }

        body { 
            background: var(--bg-deep); 
            color: #f1f5f9; 
            overflow: hidden; 
            font-family: 'Inter', system-ui, sans-serif; 
            /* Fix for Android/iOS navigation bars */
            height: 100vh;
            height: 100svh; 
            margin: 0;
            display: flex; 
            flex-direction: column; 
            touch-action: none;
        }
        
        /* 1. Preview Area: Maintains 16:9 Aspect Ratio */
        #canvas-wrap { 
            flex: 1; 
            background: #000;
            position: relative; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            width: 100%;
            overflow: hidden;
        }

        #render-canvas { 
            width: 100% !important; 
            height: auto !important; 
            aspect-ratio: 16 / 9;
            max-height: 85%; 
            object-fit: contain;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        /* 2. Premium Dashboard: Lifted to clear system buttons */
        .control-bar { 
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            padding: 16px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
            
            /* The "Buffer" fix for Android Back/Home buttons */
            padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 28px); 
            
            box-shadow: 0 -15px 40px rgba(0,0,0,0.9);
            z-index: 50;
        }

        @media (orientation: portrait) {
            .control-bar { grid-template-columns: 1fr; gap: 14px; }
            .panel { align-items: center !important; text-align: center !important; }
            .btn-premium { min-height: 44px; }
        }

        /* 3. UI Elements */
        .btn-premium { 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 800; border-radius: 14px; text-transform: uppercase; 
            font-size: 10px; letter-spacing: 0.05em;
            transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-premium:active { transform: scale(0.95); opacity: 0.8; }
        
        .bg-blue-grad { background: var(--accent-blue); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        .bg-green-grad { background: var(--accent-green); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }
        .bg-glass { background: rgba(255,255,255,0.08); }

        .rec-btn { 
            width: 60px; height: 60px; border-radius: 50%; 
            background: var(--accent-red); border: 4px solid #fff; 
            cursor: pointer; box-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
        }
        .rec-btn.active { border-radius: 15px; background: #fff; border-color: #ef4444; animation: pulse-glow 1.5s infinite; }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        input[type=range] { appearance: none; background: rgba(255,255,255,0.1); height: 4px; border-radius: 10px; width: 100%; }
        input[type=range]::-webkit-slider-thumb { appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #fff; border: 2px solid #3b82f6; }
    </style>
</head>
<body>

<div class="fixed top-4 left-4 right-4 flex justify-between items-center z-[100]">
    <div id="status-badge" class="px-3 py-1 rounded-full text-[9px] font-black bg-black/40 backdrop-blur-md border border-white/10 text-blue-400 tracking-widest uppercase">Studio Pro</div>
    <div class="flex gap-2">
        <button id="upgrade-btn" onclick="checkLicense()" class="bg-blue-grad text-white px-4 py-1 rounded-full text-[9px] font-black">UPGRADE</button>
        <button onclick="toggleGallery()" class="bg-black/40 px-4 py-1.5 rounded-full text-[9px] font-black border border-white/10">🎬 GALLERY</button>
    </div>
</div>

<div id="canvas-wrap"><canvas id="render-canvas"></canvas></div>

<div class="control-bar">
    <div class="col-span-full flex justify-center items-center gap-8 pb-3 mb-1 border-b border-white/5">
        <button id="mute-btn" onclick="toggleMasterMute()" class="w-11 h-11 rounded-2xl bg-glass flex items-center justify-center text-xl">🔊</button>
        <div id="rec-trigger" class="rec-btn" onclick="toggleRecording()"></div>
        <div class="flex flex-col items-center">
            <span id="timer" class="text-[9px] font-mono text-red-500 opacity-0 font-black tracking-widest mb-1">00:00</span>
            <input type="color" id="pen-color" value="#3b82f6" class="w-8 h-8 bg-transparent border-none cursor-pointer">
        </div>
        <button onclick="clearDraw()" class="bg-glass px-4 py-2 rounded-xl text-[9px] font-black text-gray-400">CLEAR</button>
    </div>

    <div class="panel items-start">
        <div class="flex justify-between w-full mb-1">
            <span class="text-[9px] font-black text-blue-400 uppercase tracking-widest">Selfie Camera</span>
            <button onclick="toggleMirror()" class="text-[9px] text-gray-600 font-bold tracking-tighter">🪞 MIRROR</button>
        </div>
        <button onclick="startCamera('small', 'user')" class="btn-premium w-full bg-blue-grad shadow-blue-500/20">ACTIVATE SELFIE</button>
        <div class="w-full flex items-center gap-3 mt-2">
            <span class="text-[10px]">🎤</span>
            <input type="range" min="0" max="1" step="0.1" value="0.8" oninput="updateVol('small', this.value)">
        </div>
    </div>

    <div class="panel items-end text-right">
        <span class="text-[9px] font-black text-green-400 uppercase tracking-widest mb-1">Backdrop Media</span>
        <div class="flex gap-2 w-full">
            <button onclick="upload('full')" class="btn-premium flex-1 bg-glass">📂 FILE</button>
            <button id="play-pause-btn" onclick="togglePlayback()" class="btn-premium w-12 bg-glass">⏯️</button>
            <button onclick="startScreenShare()" class="btn-premium flex-1 bg-green-grad shadow-green-500/20 text-[9px]">💻 SCREEN</button>
        </div>
        <div class="w-full flex items-center gap-3 mt-2">
            <input type="range" min="0" max="1" step="0.1" value="0.5" oninput="updateVol('full', this.value)">
            <span class="text-[10px]">🔊</span>
        </div>
    </div>
</div>

<div id="gallery-overlay" class="hidden fixed inset-0 bg-slate-950/98 z-[110] overflow-y-auto p-8 backdrop-blur-2xl">
    <div class="flex justify-between items-center mb-10 max-w-4xl mx-auto">
        <h2 class="text-3xl font-black italic text-blue-400">GALLERY</h2>
        <button onclick="toggleGallery()" class="text-3xl font-light">✕</button>
    </div>
    <div id="gallery-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-6xl mx-auto"></div>
</div>

<input type="file" id="file-picker" class="hidden">

<script>
    const canvas = document.getElementById('render-canvas');
    const ctx = canvas.getContext('2d');
    let audioCtx, audioDest, recorder, chunks = [], selfieSeg, drawCtx, drawCanvas, recordingTimer, db;
    const PRO_KEY = "STREAM-PRO-2026";

    const state = {
        full: { el: null, pdf: null, page: 1, gain: null, vol: 0.5 },
        small: { el: null, x: 50, y: 380, w: 320, h: 180, dragging: false, resizing: false, opacity: 1, targetOpacity: 1, gain: null, vol: 0.8, mirrored: true },
        isRecording: false, drawing: false, isMuted: false, masterGain: null,
        isPro: localStorage.getItem('sc_pro_active') === 'true'
    };

    const dbReq = indexedDB.open("StreamCraftDB", 1);
    dbReq.onupgradeneeded = (e) => { e.target.result.createObjectStore("videos", { keyPath: "id", autoIncrement: true }); };
    dbReq.onsuccess = (e) => { db = e.target.result; init(); };

    function init() {
        canvas.width = 1280; canvas.height = 720;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        drawCanvas = document.createElement('canvas'); drawCanvas.width = 1280; drawCanvas.height = 720;
        drawCtx = drawCanvas.getContext('2d'); drawCtx.lineCap = 'round'; drawCtx.lineWidth = 6;
        updateProUI(); setupInteractions(); requestAnimationFrame(renderLoop);
    }

    function toggleMirror() { state.small.mirrored = !state.small.mirrored; if(navigator.vibrate) navigator.vibrate(30); }

    function renderLoop() {
        ctx.fillStyle='#000'; ctx.fillRect(0,0,1280,720);
        if(state.full.el) ctx.drawImage(state.full.el, 0,0,1280,720);
        ctx.drawImage(drawCanvas, 0,0);
        
        if(state.small.el && state.small.opacity > 0) {
            const s = state.small;
            ctx.save();
            ctx.globalAlpha = s.opacity;
            ctx.shadowBlur = 40; ctx.shadowColor = "rgba(0,0,0,0.8)";
            if(s.mirrored) {
                ctx.translate(s.x + s.w, s.y);
                ctx.scale(-1, 1);
                ctx.drawImage(s.el, 0, 0, s.w, s.h);
            } else {
                ctx.drawImage(s.el, s.x, s.y, s.w, s.h);
            }
            ctx.restore();
            if(!state.isRecording) {
                ctx.fillStyle = "#3b82f6";
                ctx.beginPath(); ctx.roundRect(s.x + s.w - 18, s.y + s.h - 18, 18, 18, 4); ctx.fill();
            }
        }
        requestAnimationFrame(renderLoop);
    }

    function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioDest = audioCtx.createMediaStreamDestination();
        state.masterGain = audioCtx.createGain();
        state.masterGain.connect(audioDest);
        state.masterGain.connect(audioCtx.destination);
    }

    async function startCamera(target, mode) {
        initAudio();
        try {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode }, audio: true });
            const v = document.createElement('video'); v.srcObject = s; v.play();
            if (target === 'small') {
                if(!selfieSeg) await initSegmentation();
                const run = async () => { if(v.readyState>=2) await selfieSeg.send({image:v}); requestAnimationFrame(run); }; run();
            } else state.full.el = v;
            mixAudio(v, target, s);
        } catch(e) { alert("Camera Access Required"); }
    }

    async function initSegmentation() {
        selfieSeg = new SelfieSegmentation({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${f}`});
        selfieSeg.setOptions({ modelSelection: 1 });
        selfieSeg.onResults(res => {
            const off = document.createElement('canvas'); off.width = 640; off.height = 480;
            const oCtx = off.getContext('2d');
            oCtx.drawImage(res.segmentationMask, 0, 0, 640, 480);
            oCtx.globalCompositeOperation = 'source-in';
            oCtx.drawImage(res.image, 0, 0, 640, 480);
            state.small.el = off;
        });
    }

    function mixAudio(el, target, stream = null) {
        initAudio(); if (audioCtx.state === 'suspended') audioCtx.resume();
        let source = stream ? audioCtx.createMediaStreamSource(stream) : audioCtx.createMediaElementSource(el);
        const g = audioCtx.createGain(); g.gain.value = state[target].vol;
        source.connect(g).connect(state.masterGain);
        state[target].gain = g;
    }

    function updateVol(target, val) {
        state[target].vol = parseFloat(val);
        if (state[target].gain) state[target].gain.gain.setTargetAtTime(val, audioCtx.currentTime, 0.01);
    }

    function toggleMasterMute() {
        initAudio(); state.isMuted = !state.isMuted;
        state.masterGain.gain.setTargetAtTime(state.isMuted ? 0 : 1, audioCtx.currentTime, 0.05);
        document.getElementById('mute-btn').innerText = state.isMuted ? "🔇" : "🔊";
        document.getElementById('mute-btn').classList.toggle('bg-red-500/20', state.isMuted);
    }

    function togglePlayback() {
        const media = state.full.el;
        if (media && media.tagName === 'VIDEO') {
            media.paused ? media.play() : media.pause();
        }
    }

    function toggleRecording() {
        const btn = document.getElementById('rec-trigger');
        const timer = document.getElementById('timer');
        if (!state.isRecording) {
            chunks = []; const s = canvas.captureStream(60);
            if(audioDest) s.addTrack(audioDest.stream.getAudioTracks()[0]);
            recorder = new MediaRecorder(s, { mimeType: 'video/webm' });
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const b = new Blob(chunks, { type: 'video/webm' });
                saveToLocalDB(b);
                const a = document.createElement('a'); a.href = URL.createObjectURL(b);
                a.download = state.isPro ? "Studio_Pro_Capture.webm" : "Demo_Capture.webm"; a.click();
            };
            recorder.start(); state.isRecording = true; btn.classList.add('active');
            timer.classList.remove('opacity-0');
            let secs = 0; recordingTimer = setInterval(() => {
                secs++; timer.innerText = `REC ${Math.floor(secs/60).toString().padStart(2,'0')}:${(secs%60).toString().padStart(2,'0')}`;
                if(!state.isPro && secs >= 30) { toggleRecording(); alert("Demo Limit Reached. Upgrade for Unlimited!"); }
            }, 1000);
        } else { recorder.stop(); state.isRecording = false; btn.classList.remove('active'); clearInterval(recordingTimer); timer.classList.add('opacity-0'); }
    }

    async function saveToLocalDB(blob) {
        const entry = { blob: blob, timestamp: new Date().toLocaleString(), size: (blob.size / 1024 / 1024).toFixed(1) + " MB" };
        db.transaction(["videos"], "readwrite").objectStore("videos").add(entry);
    }

    function upload(t){const p=document.getElementById('file-picker');p.onchange=async(e)=>{const f=e.target.files[0],u=URL.createObjectURL(f);if(f.type==='application/pdf'){state[t].pdf=await pdfjsLib.getDocument(u).promise;renderPDF(t,1)}else if(f.type.startsWith('video')){const v=document.createElement('video');v.src=u;v.loop=true;v.play();state[t].el=v;mixAudio(v,t)}else{const i=new Image();i.src=u;state[t].el=i}};p.click();}
    async function renderPDF(t,n){const p=await state[t].pdf.getPage(n),v=p.getViewport({scale:2}),c=document.createElement('canvas');c.width=v.width;c.height=v.height;await p.render({canvasContext:c.getContext('2d'),viewport:v}).promise;state[t].el=c;}
    
    function startScreenShare(){if(!state.isPro){checkLicense();return;}navigator.mediaDevices.getDisplayMedia({video:true,audio:true}).then(s=>{const v=document.createElement('video');v.srcObject=s;v.play();state.full.el=v;mixAudio(v, 'full', s);});}

    function toggleGallery() { document.getElementById('gallery-overlay').classList.toggle('hidden'); if(!document.getElementById('gallery-overlay').classList.contains('hidden')) loadGallery(); }
    function loadGallery() {
        const grid = document.getElementById('gallery-grid'); grid.innerHTML = "";
        db.transaction("videos").objectStore("videos").openCursor(null, 'prev').onsuccess = (e) => {
            const c = e.target.result;
            if (c) {
                const d = c.value; const u = URL.createObjectURL(d.blob);
                grid.innerHTML += `<div class="bg-white/5 border border-white/10 p-5 rounded-3xl backdrop-blur-xl">
                    <video src="${u}" controls class="w-full rounded-2xl mb-3 shadow-2xl bg-black"></video>
                    <div class="flex justify-between items-center"><div class="text-[10px] text-gray-400 font-bold"><p>${d.timestamp}</p><p>${d.size}</p></div>
                    <a href="${u}" download="capture.webm" class="bg-blue-grad px-4 py-2 rounded-xl text-[10px] font-black">SAVE</a></div></div>`;
                c.continue();
            }
        };
    }

    function setupInteractions() {
        const getPos=(e)=>{
            const r=canvas.getBoundingClientRect();
            const cX = e.touches ? e.touches[0].clientX : e.clientX;
            const cY = e.touches ? e.touches[0].clientY : e.clientY;
            return {x:(cX-r.left)*(1280/r.width), y:(cY-r.top)*(720/r.height)};
        };
        const start=(e)=>{
            const p=getPos(e), s=state.small;
            if(p.x>s.x+s.w-60 && p.y>s.y+s.h-60) state.small.resizing=true;
            else if(p.x>s.x && p.x<s.x+s.w && p.y>s.y && p.y<s.y+s.h) state.small.dragging=true;
            else { state.drawing=true; drawCtx.beginPath(); drawCtx.moveTo(p.x,p.y); drawCtx.strokeStyle=document.getElementById('pen-color').value; }
        };
        const move=(e)=>{
            if(!state.small.dragging && !state.small.resizing && !state.drawing) return;
            const p=getPos(e);
            if(state.small.dragging){state.small.x=p.x-state.small.w/2; state.small.y=p.y-state.small.h/2;}
            if(state.small.resizing){state.small.w=Math.max(150, p.x-state.small.x); state.small.h=Math.max(100, p.y-state.small.y);}
            if(state.drawing){drawCtx.lineTo(p.x,p.y); drawCtx.stroke();}
        };
        canvas.addEventListener('mousedown', start); canvas.addEventListener('touchstart', start, {passive:false});
        window.addEventListener('mousemove', move); window.addEventListener('touchmove', move, {passive:false});
        window.addEventListener('mouseup', () => state.small.dragging=state.small.resizing=state.drawing=false);
        window.addEventListener('touchend', () => state.small.dragging=state.small.resizing=state.drawing=false);
    }
    
    function checkLicense() { if (prompt("Enter License Key:") === PRO_KEY) { localStorage.setItem('sc_pro_active', 'true'); location.reload(); } }
    function updateProUI() { if (state.isPro) { document.getElementById('status-badge').innerText = "⭐ PRO ACTIVE"; document.getElementById('status-badge').classList.replace('text-blue-300','text-yellow-400'); if(document.getElementById('upgrade-btn')) document.getElementById('upgrade-btn').remove(); } }
    function clearDraw(){drawCtx.clearRect(0,0,1280,720);}
</script>
</body>
</html>
